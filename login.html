<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Login API</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{

            font-family: Arial;
            background: #dbeafe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }

        .login{

            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);

        }

        h1{
            text-align: center;
            color: #1e3a8a;
        }

        input{

            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;

        }

        button{

            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;

        }

    </style>

</head>
<body>

    <div class="login">

        <h1>Iniciar Sesión</h1>

        <input type="text" id="usuario" placeholder="Usuario">

        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">
            Entrar
        </button>

    </div>

<script>

function login(){

    const usuario = document.getElementById("usuario").value;

    const password = document.getElementById("password").value;

    fetch("http://localhost/mi_api/api/auth/login.php", {

        method: "POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            usuario,
            password

        })

    })

    .then(response => response.json())

    .then(data => {

        if(data.estado == "ok"){

            Swal.fire({
                icon: "success",
                title: data.mensaje
            });

            setTimeout(() => {

                window.location.href = "index.php";

            }, 1500);

        }else{

            Swal.fire({
                icon: "error",
                title: data.mensaje
            });

        }

    });

}

</script>

</body>
</html>
